name: Deploy to Lightsail

on:
  push:
    branches: [claude/disease-reporter-identification-g1MTI, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: POSTGRES_PASSWORD,NEXTAUTH_SECRET,NEXTAUTH_URL,GIT_BRANCH
          script: |
            set -e
            cd /opt/farm

            git fetch origin
            git checkout "$GIT_BRANCH"
            git pull origin "$GIT_BRANCH"

            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD" > .env
            printf 'NEXTAUTH_SECRET=%s\n'   "$NEXTAUTH_SECRET"   >> .env
            printf 'NEXTAUTH_URL=%s\n'      "$NEXTAUTH_URL"       >> .env

            docker compose up -d --build
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          GIT_BRANCH: ${{ github.ref_name }}
