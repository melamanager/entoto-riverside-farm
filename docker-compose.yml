services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: entoto_farm
      POSTGRES_USER: entoto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entoto -d entoto_farm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farm_net

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx prisma migrate resolve --rolled-back 20260521000000_init 2>/dev/null || true && npx prisma migrate deploy && npx prisma db seed"
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://entoto:${POSTGRES_PASSWORD}@postgres:5432/entoto_farm
    networks:
      - farm_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://entoto:${POSTGRES_PASSWORD}@postgres:5432/entoto_farm
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SMS_ETHIOPIA_TOKEN: ${SMS_ETHIOPIA_TOKEN:-}
      SMS_ETHIOPIA_BASE_URL: ${SMS_ETHIOPIA_BASE_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TOMORROW_IO_API_KEY: ${TOMORROW_IO_API_KEY:-}
    ports:
      - "3000:3000"
    networks:
      - farm_net

volumes:
  postgres_data:

networks:
  farm_net:
    driver: bridge
